<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>板块一页通</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --paper: #ffffff;
      --text: #20242a;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #245bdb;
      --accent-soft: #eaf0ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.72 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0 56px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
    }
    .list {
      display: grid;
      gap: 12px;
    }
    .card {
      display: block;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: inherit;
      text-decoration: none;
    }
    .card:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .name {
      display: block;
      font-size: 18px;
      font-weight: 700;
      color: #162033;
    }
    .date {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }
    .empty {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--muted);
    }
    @media (max-width: 520px) {
      main { width: calc(100% - 24px); padding-top: 22px; }
      h1 { font-size: 25px; }
      .card { padding: 15px 14px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>板块一页通</h1>
    <p class="subtitle">已发布报告入口，适合手机 Safari 直接阅读。</p>
    <section class="list" aria-label="报告列表">
      <a class="card" href="sector_one_pager/%E5%95%86%E4%B8%9A%E8%88%AA%E5%A4%A9-%E6%9D%BF%E5%9D%97%E4%B8%80%E9%A1%B5%E9%80%9A-20260511.html"><span class="name">商业航天</span><span class="date">2026-05-11</span></a>
      <a class="card" href="sector_one_pager/%E4%BA%BA%E5%BD%A2%E6%9C%BA%E5%99%A8%E4%BA%BA-%E6%9D%BF%E5%9D%97%E4%B8%80%E9%A1%B5%E9%80%9A-20260511.html"><span class="name">人形机器人</span><span class="date">2026-05-11</span></a>
    </section>
  </main>
</body>
</html>
